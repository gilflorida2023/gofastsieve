name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        go-version: ["1.21", "1.22"]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - run: go build ./...
      - run: go test -v -race ./...
      - run: go vet ./...

  math-kat-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go build -o fastsieve ./cmd/fastsieve
      - name: Verify A000040 ci_smoke
        run: |
          EXPECTED="18ac898998c81cb9eb52d37be6cd452a3b19babedbdd5cc6e8ffff20e7c2b048"
          GOT=$(./fastsieve --count=1000 --hash)
          if [ "$GOT" != "$EXPECTED" ]; then
            echo "FAIL: got $GOT, expected $EXPECTED"
            exit 1
          fi
          echo "OK: hash matches $EXPECTED"
